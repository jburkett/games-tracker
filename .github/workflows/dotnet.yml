#          branch: ${{ github.ref }}
#          dir: ${{ './github-actions/DotNet.GitHubAction' }}

      - name: Lint Code Base
        uses: github/super-linter@v4
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
